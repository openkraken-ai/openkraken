name: OpenKraken CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store (eval + build cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.config/nix
          key: nix-${{ matrix.os }}-${{ hashFiles('**/flake.lock', '**/devenv.lock') }}
          restore-keys: |
            nix-${{ matrix.os }}-

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: openkraken
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv, cachix

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build Orchestrator
        run: nix build .#packages.${{ matrix.system }}.openkraken-orchestrator

      - name: Build Gateway
        run: nix build .#packages.${{ matrix.system }}.openkraken-gateway

      - name: Run Devenv Tests
        run: devenv test --no-cached

      - name: Generate SBOM
        run: nix run .#sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.os }}
          path: sbom-*.json
          retention-days: 90

      - name: Build and verify
        run: |
          devenv tasks run build

      - name: Push to Cachix (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          nix copy --to cachix://openkraken result
